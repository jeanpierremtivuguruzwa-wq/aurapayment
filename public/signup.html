<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Create Account - Aura payment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f7fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        .logo {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #0b1b3a;
            margin-bottom: 2rem;
        }

        .signup-card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15);
        }

        h2 {
            color: #0b1b3a;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 1.8rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            color: #2d3748;
            font-weight: 500;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

        .optional {
            color: #a0aec0;
            font-size: 0.8rem;
            font-weight: normal;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.2s;
            background: #ffffff;
        }

        input:focus {
            outline: none;
            border-color: #0b1b3a;
            box-shadow: 0 0 0 3px rgba(11, 27, 58, 0.1);
        }

        .password-requirements {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #718096;
        }

        .create-account-btn {
            width: 100%;
            padding: 0.9rem;
            background: #0b1b3a;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin: 1.2rem 0 1rem;
            transition: background 0.2s;
        }

        .create-account-btn:hover {
            background: #1f2f4f;
        }

        .signin-link {
            text-align: center;
            color: #718096;
            font-size: 0.9rem;
        }

        .signin-link a {
            color: #0b1b3a;
            text-decoration: none;
            font-weight: 600;
        }

        .signin-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #e53e3e;
            font-size: 0.75rem;
            margin-top: 0.25rem;
            display: none;
        }

        .success-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .success-modal.show {
            display: flex;
        }

        .success-box {
            background: white;
            border-radius: 28px;
            padding: 2rem;
            text-align: center;
            max-width: 340px;
            width: 90%;
            animation: scaleIn 0.3s ease-out;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .success-icon {
            font-size: 3.5rem;
            margin-bottom: 0.8rem;
        }

        .success-box h3 {
            color: #0b1b3a;
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .success-box p {
            color: #4a5568;
            font-size: 0.9rem;
        }

        .countdown {
            color: #0b1b3a;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 0.5rem;
        }

        @media (max-width: 480px) {
            .signup-card {
                padding: 1.5rem;
            }
            h2 {
                font-size: 1.5rem;
            }
            .logo {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">Aura payment</div>

    <div class="signup-card">
        <h2>Create Account</h2>
        <div class="subtitle">Get started with your account</div>

        <form id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Alex Walter" required>
                <div class="error-message" id="nameError"></div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="hello@aura.com" required>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label>Display Name <span class="optional">(Optional)</span></label>
                <input type="text" id="displayName" placeholder="Alex">
            </div>

            <div class="form-group">
                <label>Phone Number <span class="optional">(Optional)</span></label>
                <input type="tel" id="phone" placeholder="+7 900 000 00 00">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
                <div class="password-requirements">Minimum 8 characters with at least one number</div>
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" required>
                <div class="error-message" id="confirmError"></div>
            </div>

            <div id="feedbackMessage" style="display: none; padding: 0.8rem; border-radius: 12px; margin-bottom: 1rem; text-align: center; font-size: 0.85rem;"></div>

            <button type="submit" class="create-account-btn" id="submitBtn">
                Create Account
            </button>

            <div class="signin-link">
                Already have an account? <a href="signin.html">Sign in</a>
            </div>
        </form>
    </div>
</div>

<!-- Success Modal (redirects to dashboard) -->
<div id="successModal" class="success-modal">
    <div class="success-box">
        <div class="success-icon">🎉</div>
        <h3>Account Created!</h3>
        <p>Redirecting to your dashboard...</p>
        <div class="countdown"><span id="countdown">2</span> seconds</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDlz5mH-x7P7H6FNdPj62PYhqAY5hsH19A",
        authDomain: "aura-payment.firebaseapp.com",
        projectId: "aura-payment",
        storageBucket: "aura-payment.firebasestorage.app",
        messagingSenderId: "213847107667",
        appId: "1:213847107667:web:9949c7a1ad9101959afea6",
        measurementId: "G-YG1G8CGC07"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function showError(elementId, message) {
        const el = document.getElementById(elementId);
        el.textContent = message;
        el.style.display = 'block';
    }

    function hideAllErrors() {
        document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
    }

    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    const form = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const feedbackDiv = document.getElementById('feedbackMessage');

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        hideAllErrors();
        feedbackDiv.style.display = 'none';

        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const displayNameInput = document.getElementById('displayName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        let isValid = true;

        if (fullName.length < 3) {
            showError('nameError', 'Please enter your full name (at least 3 characters)');
            isValid = false;
        }
        if (!isValidEmail(email)) {
            showError('emailError', 'Please enter a valid email address');
            isValid = false;
        }
        if (password.length < 8) {
            showError('passwordError', 'Password must be at least 8 characters');
            isValid = false;
        }
        if (password.length >= 8 && !/\d/.test(password)) {
            showError('passwordError', 'Password must contain at least one number');
            isValid = false;
        }
        if (password !== confirmPassword) {
            showError('confirmError', 'Passwords do not match');
            isValid = false;
        }

        if (!isValid) return;

        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Creating account...';

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // Set display name (Firebase profile)
            const finalDisplayName = displayNameInput || fullName.split(' ')[0] || fullName;
            await updateProfile(user, { displayName: finalDisplayName });

            // Store user data
            const userData = {
                uid: user.uid,
                email: user.email,
                fullName: fullName,
                full_name: fullName,
                displayName: finalDisplayName,
                display_name: finalDisplayName,
                phone: phone,
                emailVerified: user.emailVerified
            };
            localStorage.setItem('currentUser', JSON.stringify(userData));
            localStorage.setItem('aura_user_profile', JSON.stringify(userData));

            // Show success modal and redirect to dashboard
            const modal = document.getElementById('successModal');
            modal.classList.add('show');

            let count = 2;
            const countdownEl = document.getElementById('countdown');
            const interval = setInterval(() => {
                count--;
                countdownEl.textContent = count;
                if (count <= 0) {
                    clearInterval(interval);
                    window.location.href = 'dashboard.html';   // CHANGED from index.html
                }
            }, 1000);

        } catch (error) {
            console.error('Signup error:', error.code);
            let msg = 'Signup failed. ';
            switch (error.code) {
                case 'auth/email-already-in-use':
                    msg = 'This email is already registered. Please sign in instead.';
                    break;
                case 'auth/weak-password':
                    msg = 'Password is too weak. Use at least 8 characters with numbers and letters.';
                    break;
                case 'auth/invalid-email':
                    msg = 'Please enter a valid email address.';
                    break;
                default:
                    msg = error.message;
            }
            feedbackDiv.style.display = 'block';
            feedbackDiv.style.background = '#fed7d7';
            feedbackDiv.style.color = '#742a2a';
            feedbackDiv.innerHTML = `❌ ${msg}`;
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Account';
        }
    });
</script>
</body>
</html>
