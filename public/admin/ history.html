<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Aura payment</title>
    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f7fafc;
            padding: 2rem;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 2rem;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0b1b3a;
        }
        .nav-menu {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .nav-menu a {
            text-decoration: none;
            color: #4a5568;
            font-weight: 500;
            padding: 0.5rem 0;
        }
        .nav-menu a.active {
            color: #0b1b3a;
            border-bottom: 2px solid #0b1b3a;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .user-name {
            color: #2d3748;
            font-weight: 500;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: #0b1b3a;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            margin-bottom: 1.5rem;
            color: #0b1b3a;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f8fafc;
            font-weight: 600;
            color: #4a5568;
        }
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-pending { background: #fef3c7; color: #b45309; }
        .status-uploaded { background: #d1fae5; color: #065f46; }
        .status-completed { background: #c7d2fe; color: #3730a3; }
        .proof-link {
            color: #0b1b3a;
            text-decoration: none;
            font-weight: 500;
        }
        .proof-link:hover {
            text-decoration: underline;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #718096;
            text-decoration: none;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #718096;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e2e8f0;
            border-top-color: #0b1b3a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Aura payment</div>
        <div class="nav-menu">
            <a href="dashboard.html">Dashboard</a>
            <a href="send-money.html">Send Money</a>
            <a href="history.html" class="active">History</a>
            <a href="profile.html">Profile</a>
        </div>
        <div class="user-profile" id="userProfile">
            <span class="user-name" id="displayName">Loading...</span>
            <div class="avatar" id="userInitials">...</div>
        </div>
    </nav>

    <div class="main-content">
        <h1>Transaction History</h1>
        <table id="history-table">
            <thead>
                <tr><th>Date</th><th>Amount</th><th>Recipient</th><th>Status</th><th>Proof</th></tr>
            </thead>
            <tbody id="history-body">
                <tr><td colspan="5" class="empty-state"><span class="loading-spinner"></span> Loading transactions...</td></tr>
            </tbody>
        </table>
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDlz5mH-x7P7H6FNdPj62PYhqAY5hsH19A",
            authDomain: "aura-payment.firebaseapp.com",
            projectId: "aura-payment",
            storageBucket: "aura-payment.firebasestorage.app",
            messagingSenderId: "213847107667",
            appId: "1:213847107667:web:9949c7a1ad9101959afea6",
            measurementId: "G-YG1G8CGC07"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Wait for auth state and load transactions
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                // Not signed in – redirect to signin
                window.location.href = 'signin.html';
                return;
            }

            // Update navbar with user info
            const userData = JSON.parse(localStorage.getItem('currentUser')) || {};
            const fullName = userData.fullName || user.displayName || user.email.split('@')[0];
            const displayName = userData.displayName || fullName.split(' ')[0];
            document.getElementById('displayName').textContent = displayName;
            const initials = fullName.split(' ').map(n => n[0]).join('').toUpperCase();
            document.getElementById('userInitials').textContent = initials.substring(0, 2);

            // Load transactions from Firestore
            const tbody = document.getElementById('history-body');
            try {
                const snapshot = await db.collection('transactions')
                    .where('userId', '==', user.uid)
                    .orderBy('timestamp', 'desc')
                    .get();

                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No transactions yet.</td></tr>';
                    return;
                }

                let html = '';
                snapshot.forEach(doc => {
                    const tx = doc.data();
                    const date = tx.timestamp?.toDate ? tx.timestamp.toDate() : new Date(tx.timestamp);
                    const formattedDate = date.toLocaleString();
                    const amount = `${tx.amountSent} ${tx.currencySent}`;
                    const recipient = tx.recipientName || '—';
                    const status = tx.status || 'pending';
                    const proofLink = tx.proofDownloadURL 
                        ? `<a href="${tx.proofDownloadURL}" target="_blank" class="proof-link">View Proof</a>` 
                        : 'Not uploaded';
                    
                    html += `
                        <tr>
                            <td>${formattedDate}</td>
                            <td>${amount}</td>
                            <td>${recipient}</td>
                            <td><span class="status-badge status-${status}">${status}</span></td>
                            <td>${proofLink}</td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            } catch (error) {
                console.error('Error loading transactions:', error);
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Error loading transactions. Please try again later.</td></tr>';
            }
        });
    </script>
</body>
</html>
