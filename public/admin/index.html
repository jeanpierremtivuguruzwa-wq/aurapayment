<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aura Payment Admin Dashboard" />
    <title>Aura Payment – Admin Dashboard</title>
    <!-- Tailwind CSS CDN (v3) – quick styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom overrides (optional) -->
    <style>
      * {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      }
      body {
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);

        transition: all 0.2s ease;
      }
      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      /* Loading state */
      #root:empty::before {
        content: "Loading admin dashboard...";
        display: block;
        padding: 2rem;
        color: #64748b;
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 500;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-Cbnr4RX3.js"></script>
  </head>
  <body class="bg-gray-100">
    <div id="root"></div>
  </body>
</html>
    <title>Aura Payment – Admin Dashboard</title>

    <!-- Google Fonts: Inter + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      /* ─── Reset & Base ────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg-deep:      #06080f;
        --bg-dark:      #0a0e1a;
        --bg-card:      rgba(13, 18, 35, 0.85);
        --gold:         #c9a84c;
        --gold-light:   #e8c96d;
        --gold-dim:     rgba(201, 168, 76, 0.18);
        --gold-glow:    rgba(201, 168, 76, 0.35);
        --navy:         #0d1630;
        --navy-mid:     #111b38;
        --text-primary: #f0f2f8;
        --text-muted:   #8892a4;
        --border:       rgba(201, 168, 76, 0.15);
        --border-dim:   rgba(255, 255, 255, 0.06);
        --font-body:    'Inter', 'DM Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
        --radius:       14px;
        --transition:   0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      html { height: 100%; font-size: 16px; }

      body {
        height: 100%;
        font-family: var(--font-body);
        background-color: var(--bg-deep);
        color: var(--text-primary);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ─── Premium Scrollbar ───────────────────────────── */
      ::-webkit-scrollbar              { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track        { background: var(--bg-dark); }
      ::-webkit-scrollbar-thumb        { background: rgba(201,168,76,0.3); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover  { background: rgba(201,168,76,0.55); }
      * { scrollbar-width: thin; scrollbar-color: rgba(201,168,76,0.3) var(--bg-dark); }

      /* ─── Root Shell ──────────────────────────────────── */
      #root {
        min-height: 100vh;
        width: 100%;
        position: relative;
        z-index: 1;
      }

      /* ─── Animated Background ─────────────────────────── */
      .aura-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .aura-bg::before {
        content: '';
        position: absolute;
        top: -30%;
        left: -20%;
        width: 70%;
        height: 70%;
        background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 65%);
        animation: driftA 22s ease-in-out infinite alternate;
      }
      .aura-bg::after {
        content: '';
        position: absolute;
        bottom: -25%;
        right: -15%;
        width: 60%;
        height: 60%;
        background: radial-gradient(ellipse, rgba(30,60,160,0.1) 0%, transparent 65%);
        animation: driftB 26s ease-in-out infinite alternate;
      }
      .aura-bg-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
      }

      @keyframes driftA {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(5%, 8%) scale(1.15); }
      }
      @keyframes driftB {
        0%   { transform: translate(0, 0) scale(1.1); }
        100% { transform: translate(-6%, -5%) scale(1); }
      }

      /* ─── Loading Screen ──────────────────────────────── */
      #aura-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg-deep);
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #aura-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
        padding: 3rem 3.5rem;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) * 1.5);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow:
          0 0 0 1px var(--border-dim),
          0 32px 64px rgba(0,0,0,0.6),
          0 0 80px var(--gold-dim);
        animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
      }

      @keyframes cardIn {
        from { opacity: 0; transform: translateY(24px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      .loader-logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .loader-logo-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--gold) 0%, #8b6914 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(201,168,76,0.4);
        font-size: 22px;
        animation: pulse-icon 2.5s ease-in-out infinite;
      }
      @keyframes pulse-icon {
        0%, 100% { box-shadow: 0 4px 20px rgba(201,168,76,0.4); }
        50%       { box-shadow: 0 4px 32px rgba(201,168,76,0.7); }
      }
      .loader-logo-text {
        display: flex;
        flex-direction: column;
        line-height: 1;
      }
      .loader-brand {
        font-family: 'DM Sans', var(--font-body);
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        background: linear-gradient(90deg, var(--gold-light), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .loader-sub {
        font-size: 0.68rem;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-top: 3px;
      }

      .loader-divider {
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border), transparent);
      }

      .loader-status {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        width: 100%;
      }
      .loader-spinner {
        position: relative;
        width: 40px;
        height: 40px;
      }
      .loader-spinner::before,
      .loader-spinner::after {
        content: '';
        position: absolute;
        border-radius: 50%;
      }
      .loader-spinner::before {
        inset: 0;
        border: 2px solid rgba(201,168,76,0.12);
      }
      .loader-spinner::after {
        inset: 0;
        border: 2px solid transparent;
        border-top-color: var(--gold);
        border-right-color: var(--gold-light);
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .loader-track {
        width: 220px;
        height: 3px;
        background: rgba(255,255,255,0.06);
        border-radius: 99px;
        overflow: hidden;
      }
      .loader-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--gold), var(--gold-light));
        border-radius: 99px;
        animation: fillBar 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        box-shadow: 0 0 8px var(--gold-glow);
      }
      @keyframes fillBar {
        0%   { width: 0%; }
        40%  { width: 55%; }
        70%  { width: 78%; }
        90%  { width: 92%; }
        100% { width: 100%; }
      }

      .loader-label {
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-muted);
        letter-spacing: 0.05em;
        animation: blink 1.8s ease-in-out infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 0.5; }
        50%       { opacity: 1; }
      }

      .loader-dots {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .loader-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--gold);
        opacity: 0.3;
        animation: dotPulse 1.4s ease-in-out infinite both;
      }
      .loader-dot:nth-child(1) { animation-delay: 0s; }
      .loader-dot:nth-child(2) { animation-delay: 0.2s; }
      .loader-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dotPulse {
        0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
        40%            { opacity: 1;   transform: scale(1.2); }
      }

      .loader-footer {
        font-size: 0.68rem;
        color: rgba(136,146,164,0.5);
        letter-spacing: 0.06em;
      }
      .loader-footer span { color: rgba(201,168,76,0.5); }

      /* ─── Error Screen ────────────────────────────────── */
      #aura-error {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9998;
        align-items: center;
        justify-content: center;
        background: var(--bg-deep);
        padding: 1.5rem;
      }
      #aura-error.visible { display: flex; }

      .error-card {
        max-width: 480px;
        width: 100%;
        padding: 2.5rem;
        background: var(--bg-card);
        border: 1px solid rgba(220, 53, 69, 0.2);
        border-radius: calc(var(--radius) * 1.5);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow:
          0 0 0 1px rgba(220,53,69,0.08),
          0 32px 64px rgba(0,0,0,0.6),
          0 0 60px rgba(220,53,69,0.08);
        animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .error-header {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .error-icon {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: rgba(220,53,69,0.12);
        border: 1px solid rgba(220,53,69,0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
      }
      .error-title-wrap {}
      .error-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: #f87171;
        letter-spacing: -0.01em;
      }
      .error-subtitle {
        font-size: 0.78rem;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .error-divider {
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(220,53,69,0.15), transparent);
      }

      .error-body {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .error-message-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-muted);
        font-weight: 600;
      }
      .error-message-box {
        background: rgba(0,0,0,0.35);
        border: 1px solid var(--border-dim);
        border-radius: 8px;
        padding: 0.85rem 1rem;
        font-size: 0.82rem;
        color: #fca5a5;
        font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
        line-height: 1.5;
        word-break: break-word;
      }

      .error-actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .error-btn {
        flex: 1;
        min-width: 120px;
        padding: 0.65rem 1.25rem;
        border-radius: 8px;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: var(--transition);
        letter-spacing: 0.02em;
      }
      .error-btn-primary {
        background: linear-gradient(135deg, var(--gold) 0%, #8b6914 100%);
        color: #0a0e1a;
        box-shadow: 0 2px 12px rgba(201,168,76,0.3);
      }
      .error-btn-primary:hover {
        filter: brightness(1.1);
        box-shadow: 0 4px 20px rgba(201,168,76,0.5);
        transform: translateY(-1px);
      }
      .error-btn-secondary {
        background: rgba(255,255,255,0.05);
        color: var(--text-muted);
        border: 1px solid var(--border-dim);
      }
      .error-btn-secondary:hover {
        background: rgba(255,255,255,0.09);
        color: var(--text-primary);
        transform: translateY(-1px);
      }

      .error-footer {
        font-size: 0.7rem;
        color: rgba(136,146,164,0.45);
        text-align: center;
        letter-spacing: 0.04em;
      }

      /* ─── Global App Transitions ──────────────────────── */
      button, a { transition: var(--transition); }
    </style>
  </head>

  <body>
    <!-- Ambient Background -->
    <div class="aura-bg" aria-hidden="true">
      <div class="aura-bg-grid"></div>
    </div>

    <!-- Loading Screen -->
    <div id="aura-loader" role="status" aria-label="Loading Aura Payment dashboard">
      <div class="loader-card">
        <div class="loader-logo">
          <div class="loader-logo-icon">⬡</div>
          <div class="loader-logo-text">
            <span class="loader-brand">Aura Payment</span>
            <span class="loader-sub">Admin Console</span>
          </div>
        </div>

        <div class="loader-divider"></div>

        <div class="loader-status">
          <div class="loader-spinner"></div>
          <div class="loader-track">
            <div class="loader-fill"></div>
          </div>
          <div class="loader-dots">
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
          </div>
          <div class="loader-label">Initializing secure session</div>
        </div>

        <div class="loader-footer">
          <span>AURA</span> &nbsp;·&nbsp; Enterprise Financial Platform
        </div>
      </div>
    </div>

    <!-- Error Screen -->
    <div id="aura-error" role="alert" aria-live="assertive">
      <div class="error-card">
        <div class="error-header">
          <div class="error-icon">⚠</div>
          <div class="error-title-wrap">
            <div class="error-title">Dashboard Failed to Load</div>
            <div class="error-subtitle">A critical error occurred during initialization</div>
          </div>
        </div>

        <div class="error-divider"></div>

        <div class="error-body">
          <div class="error-message-label">Error Details</div>
          <div class="error-message-box" id="aura-error-msg">An unexpected error occurred.</div>
        </div>

        <div class="error-actions">
          <button class="error-btn error-btn-primary" onclick="location.reload()">Reload Dashboard</button>
          <button class="error-btn error-btn-secondary" onclick="console.log('Check browser console for details')">View Console</button>
        </div>

        <div class="error-footer">Press F12 to open DevTools &nbsp;·&nbsp; aura-payment.web.app</div>
      </div>
    </div>

    <!-- React App Root -->
    <div id="root"></div>

  </body>
</html>
