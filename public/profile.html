<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Aura payment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f7fafc;
            padding: 2rem;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 2rem;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0b1b3a;
        }
        .nav-menu {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .nav-menu a {
            text-decoration: none;
            color: #4a5568;
            font-weight: 500;
            padding: 0.5rem 0;
        }
        .nav-menu a.active {
            color: #0b1b3a;
            border-bottom: 2px solid #0b1b3a;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .user-name {
            color: #2d3748;
            font-weight: 500;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: #0b1b3a;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .main-content {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            margin-bottom: 1.5rem;
            color: #0b1b3a;
        }
        label {
            display: block;
            margin-top: 1rem;
            font-weight: 500;
            color: #2d3748;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.25rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            margin-top: 2rem;
            padding: 0.75rem;
            background: #0b1b3a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1a2b4a;
        }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 12px;
            display: none;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            text-align: center;
            width: 100%;
            color: #718096;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Aura payment</div>
        <div class="nav-menu">
            <a href="dashboard.html">Dashboard</a>
            <a href="send-money.html">Send Money</a>
            <a href="history.html">History</a>
            <a href="profile.html" class="active">Profile</a>
        </div>
        <div class="user-profile" id="userProfile">
            <span class="user-name" id="displayName">Loading...</span>
            <div class="avatar" id="userInitials">...</div>
        </div>
    </nav>

    <div class="main-content">
        <h1>My Profile</h1>
        
        <!-- Profile Info Display -->
        <div id="profileInfo" style="margin-bottom: 2rem;">
            <div style="padding: 1.5rem; background: #f7fafc; border-radius: 12px;">
                <div style="margin-bottom: 1.5rem;">
                    <label style="margin-top: 0; color: #718096; font-weight: 400; font-size: 0.9rem;">Full Name</label>
                    <div style="font-size: 1.1rem; font-weight: 500; color: #0b1b3a; margin-top: 0.5rem;" id="displayFullName">Loading...</div>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="margin-top: 0; color: #718096; font-weight: 400; font-size: 0.9rem;">Email</label>
                    <div style="font-size: 1.1rem; font-weight: 500; color: #0b1b3a; margin-top: 0.5rem;" id="displayEmail">Loading...</div>
                </div>
                <div>
                    <label style="margin-top: 0; color: #718096; font-weight: 400; font-size: 0.9rem;">Account Status</label>
                    <div style="font-size: 1.1rem; font-weight: 500; color: #059669; margin-top: 0.5rem;">✓ Active</div>
                </div>
            </div>
        </div>

        <div id="message" class="message"></div>
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDlz5mH-x7P7H6FNdPj62PYhqAY5hsH19A",
            authDomain: "aura-payment.firebaseapp.com",
            projectId: "aura-payment",
            storageBucket: "aura-payment.firebasestorage.app",
            messagingSenderId: "213847107667",
            appId: "1:213847107667:web:9949c7a1ad9101959afea6",
            measurementId: "G-YG1G8CGC07"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        // Load user on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadUserProfile();
        });

        function loadUserProfile() {
            try {
                const storedUser = localStorage.getItem('currentUser');
                if (!storedUser) {
                    window.location.href = 'signin.html';
                    return;
                }

                currentUser = JSON.parse(storedUser);
                
                // Update navbar
                const fullName = currentUser.fullName || currentUser.full_name || 'User';
                const displayName = fullName.split(' ')[0];
                document.getElementById('displayName').textContent = displayName;
                const initials = fullName.split(' ').map(n => n[0]).join('').toUpperCase();
                document.getElementById('userInitials').textContent = initials.substring(0, 2);

                // Display profile info
                document.getElementById('displayFullName').textContent = fullName;
                document.getElementById('displayEmail').textContent = currentUser.email || 'N/A';

            } catch (err) {
                console.error('Error loading profile:', err);
                window.location.href = 'signin.html';
            }
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.className = 'message';
            }, 3000);
        }
    </script>
</body>
</html>
