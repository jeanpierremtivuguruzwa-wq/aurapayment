<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Aura payment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f7fafc;
            padding: 2rem;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 2rem;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0b1b3a;
        }
        .nav-menu {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .nav-menu a {
            text-decoration: none;
            color: #4a5568;
            font-weight: 500;
            padding: 0.5rem 0;
        }
        .nav-menu a.active {
            color: #0b1b3a;
            border-bottom: 2px solid #0b1b3a;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .logout-btn {
            background: none;
            border: 1.5px solid #e2e8f0;
            color: #4a5568;
            font-size: 0.82rem;
            font-weight: 500;
            padding: 0.35rem 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            width: auto;
            margin-top: 0;
        }
        .logout-btn:hover {
            background: #fee2e2;
            border-color: #fca5a5;
            color: #dc2626;
        }
        .user-name {
            color: #2d3748;
            font-weight: 500;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: #0b1b3a;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .main-content {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* ── Profile photo ── */
        .photo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }
        .photo-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            cursor: pointer;
        }
        .photo-wrapper:hover .photo-overlay { opacity: 1; }
        .profile-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e2e8f0;
            display: block;
        }
        .photo-initials {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #0b1b3a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .photo-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(0,0,0,0.45);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            gap: 4px;
        }
        .photo-overlay svg { width: 22px; height: 22px; }
        .photo-upload-btn {
            margin-top: 0.75rem;
            background: none;
            border: 1.5px solid #cbd5e0;
            color: #4a5568;
            font-size: 0.8rem;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            width: auto;
            margin-left: 0;
            transition: border-color 0.15s, color 0.15s;
        }
        .photo-upload-btn:hover { border-color: #0b1b3a; color: #0b1b3a; }
        .upload-progress {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #718096;
            min-height: 1.2em;
        }
        h1 {
            margin-bottom: 1.5rem;
            color: #0b1b3a;
        }
        label {
            display: block;
            margin-top: 1rem;
            font-weight: 500;
            color: #2d3748;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.25rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            margin-top: 2rem;
            padding: 0.75rem;
            background: #0b1b3a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1a2b4a;
        }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 12px;
            display: none;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            text-align: center;
            width: 100%;
            color: #718096;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Aura payment</div>
        <div class="nav-menu">
            <a href="dashboard.html" data-i18n="nav_dashboard">Dashboard</a>
            <a href="send-money.html" data-i18n="nav_send">Send Money</a>
            <a href="history.html" data-i18n="nav_history">History</a>
            <a href="profile.html" class="active" data-i18n="nav_profile">Profile</a>
            <a href="support.html" data-i18n="nav_support">Support</a>
        </div>
        <div class="user-profile" id="userProfile">
            <span id="langPickerNav"></span>
            <span class="user-name" id="displayName">Loading...</span>
            <div class="avatar" id="userInitials">...</div>
            <button class="logout-btn" onclick="handleLogout()" data-i18n="nav_logout">⏻ Log out</button>
        </div>
    </nav>

    <div class="main-content">
        <h1 data-i18n="prof_title">My Profile</h1>

        <!-- Photo upload -->
        <div class="photo-section">
            <div class="photo-wrapper" onclick="document.getElementById('photoInput').click()">
                <img id="profilePhotoImg" class="profile-photo" src="" alt="" style="display:none">
                <div class="photo-initials" id="profilePhotoInitials">?</div>
                <div class="photo-overlay">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                    Change
                </div>
            </div>
            <button class="photo-upload-btn" onclick="document.getElementById('photoInput').click()" data-i18n="prof_upload">📷 Upload photo</button>
            <div class="upload-progress" id="uploadProgress"></div>
            <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)">
        </div>
        <div id="profileInfo" style="margin-bottom: 2rem;">
            <div style="padding: 1.5rem; background: #f7fafc; border-radius: 12px;">
                <div style="margin-bottom: 1.5rem;">
                    <label style="margin-top: 0; color: #718096; font-weight: 400; font-size: 0.9rem;" data-i18n="prof_fullname">Full Name</label>
                    <div style="font-size: 1.1rem; font-weight: 500; color: #0b1b3a; margin-top: 0.5rem;" id="displayFullName">Loading...</div>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="margin-top: 0; color: #718096; font-weight: 400; font-size: 0.9rem;" data-i18n="prof_email">Email</label>
                    <div style="font-size: 1.1rem; font-weight: 500; color: #0b1b3a; margin-top: 0.5rem;" id="displayEmail">Loading...</div>
                </div>
                <div>
                    <label style="margin-top: 0; color: #718096; font-weight: 400; font-size: 0.9rem;" data-i18n="prof_status">Account Status</label>
                    <div style="font-size: 1.1rem; font-weight: 500; color: #059669; margin-top: 0.5rem;" data-i18n="prof_active">✓ Active</div>
                </div>
            </div>
        </div>

        <div id="message" class="message"></div>
        <a href="dashboard.html" class="back-link" data-i18n="prof_back">← Back to Dashboard</a>
    </div>

    <!-- i18n -->
    <script src="js/i18n.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDlz5mH-x7P7H6FNdPj62PYhqAY5hsH19A",
            authDomain: "aura-payment.firebaseapp.com",
            projectId: "aura-payment",
            storageBucket: "aura-payment.firebasestorage.app",
            messagingSenderId: "213847107667",
            appId: "1:213847107667:web:9949c7a1ad9101959afea6",
            measurementId: "G-YG1G8CGC07"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null;

        // Load user on page load
        document.addEventListener('DOMContentLoaded', () => {
            // Language picker
            const langNav = document.getElementById('langPickerNav');
            if (langNav && typeof renderLangPickerLight === 'function') {
                renderLangPickerLight(langNav, () => applyLanguage());
            }
            if (typeof applyLanguage === 'function') applyLanguage();

            loadUserProfile();
        });

        function handleLogout() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('aura_user_profile');
            if (auth) auth.signOut().catch(() => {});
            window.location.href = 'signin.html';
        }

        function loadUserProfile() {
            try {
                const storedUser = localStorage.getItem('currentUser');
                if (!storedUser) {
                    window.location.href = 'signin.html';
                    return;
                }

                currentUser = JSON.parse(storedUser);
                
                // Update navbar
                const fullName = currentUser.fullName || currentUser.full_name || 'User';
                const displayName = fullName.split(' ')[0];
                document.getElementById('displayName').textContent = displayName;
                const initials = fullName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                document.getElementById('userInitials').textContent = initials;

                // Profile initials in big avatar
                document.getElementById('profilePhotoInitials').textContent = initials || '?';

                // Display profile info
                document.getElementById('displayFullName').textContent = fullName;
                document.getElementById('displayEmail').textContent = currentUser.email || 'N/A';

                // Load saved photo if exists
                const savedPhoto = currentUser.photoURL || localStorage.getItem('aura_avatar_' + currentUser.uid);
                if (savedPhoto) setPhotoUI(savedPhoto);

                // Also fetch latest from Firestore in case it was updated elsewhere
                if (currentUser.uid) {
                    db.collection('users').doc(currentUser.uid).get().then(snap => {
                        if (snap.exists && snap.data().photoURL) {
                            setPhotoUI(snap.data().photoURL);
                            currentUser.photoURL = snap.data().photoURL;
                            localStorage.setItem('currentUser', JSON.stringify(currentUser));
                        }
                    }).catch(() => {});
                }

            } catch (err) {
                console.error('Error loading profile:', err);
                window.location.href = 'signin.html';
            }
        }

        function setPhotoUI(url) {
            const img = document.getElementById('profilePhotoImg');
            const initDiv = document.getElementById('profilePhotoInitials');
            const navAvatar = document.getElementById('userInitials');
            img.src = url;
            img.style.display = 'block';
            initDiv.style.display = 'none';
            // Also update navbar avatar with photo
            navAvatar.innerHTML = `<img src="${url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;" alt="avatar">`;
        }

        function handlePhotoSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                showMessage(t('prof_err_type'), 'error');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showMessage(t('prof_err_size'), 'error');
                return;
            }
            uploadPhoto(file);
        }

        async function uploadPhoto(file) {
            const progress = document.getElementById('uploadProgress');
            progress.textContent = 'Uploading…';

            try {
                // Sign in anonymously if no Firebase auth session (auth is managed by localStorage)
                let uid = currentUser?.uid;
                if (!uid) throw new Error('Not logged in');

                // Try to sign in with Firebase auth using stored credentials
                // Since auth is localStorage-based, we use the uid as the storage path
                const ref = storage.ref(`avatars/${uid}/profile.jpg`);
                const snapshot = await ref.put(file, { contentType: file.type });
                const url = await snapshot.ref.getDownloadURL();

                // Save URL to Firestore
                await db.collection('users').doc(uid).set({ photoURL: url }, { merge: true });

                // Save to localStorage
                currentUser.photoURL = url;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                localStorage.setItem('aura_avatar_' + uid, url);

                setPhotoUI(url);
                progress.textContent = '';
                showMessage(t('prof_saved'), 'success');
            } catch (err) {
                console.error('Upload error:', err);
                // If storage auth fails, save as data URL in localStorage instead
                const reader = new FileReader();
                reader.onload = e => {
                    const dataUrl = e.target.result;
                    currentUser.photoURL = dataUrl;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    if (currentUser.uid) localStorage.setItem('aura_avatar_' + currentUser.uid, dataUrl);
                    setPhotoUI(dataUrl);
                    progress.textContent = '';
                    showMessage(t('prof_saved_local'), 'success');
                };
                reader.readAsDataURL(file);
            }
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.className = 'message';
            }, 3000);
        }
    </script>
</body>
</html>
