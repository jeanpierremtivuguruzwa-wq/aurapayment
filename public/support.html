<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Chat - Aura Payment</title>
    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f7fafc;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0b1b3a;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-menu a {
            text-decoration: none;
            color: #4a5568;
            font-weight: 500;
            padding: 0.5rem 0;
        }

        .nav-menu a.active {
            color: #0b1b3a;
            border-bottom: 2px solid #0b1b3a;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-name {
            color: #2d3748;
            font-weight: 500;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #0b1b3a;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .main-content {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .form-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            color: #0b1b3a;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            color: #4a5568;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #0b1b3a;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .file-input {
            padding: 0.5rem;
            background: #f7fafc;
        }

        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            background: #0b1b3a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #1a2b4a;
        }

        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 12px;
            display: none;
        }

        .success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #718096;
            text-decoration: none;
        }

        .back-link:hover {
            color: #0b1b3a;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Aura payment</div>
        <div class="nav-menu">
            <a href="dashboard.html">Dashboard</a>
            <a href="send-money.html">Send Money</a>
            <a href="history.html">History</a>
            <a href="profile.html">Profile</a>
            <a href="support.html" class="active">Support</a>
        </div>
        <div class="user-profile" id="userProfile">
            <span class="user-name" id="displayName">Loading...</span>
            <div class="avatar" id="userInitials">...</div>
        </div>
    </nav>

    <div class="main-content">
        <div class="form-card">
            <h1>Submit a Support Request</h1>
            <p class="subtitle">We'll get back to you as soon as possible.</p>

            <form id="supportForm">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <select id="subject">
                        <option value="general">General Question</option>
                        <option value="transfer">Transfer Issue</option>
                        <option value="payment">Payment Problem</option>
                        <option value="account">Account Issue</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" placeholder="Describe your issue in detail..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Attach Screenshot (Optional)</label>
                    <input type="file" id="attachment" accept="image/*,.pdf" class="file-input">
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
                <div id="formMessage" class="message"></div>
            </form>
        </div>

        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        // Load current user from localStorage
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) {
            window.location.href = 'signup.html';
        }

        // Set user info in navbar
        document.getElementById('displayName').textContent = user.displayName || user.fullName.split(' ')[0];
        const initials = user.fullName.split(' ').map(n => n[0]).join('').toUpperCase();
        document.getElementById('userInitials').textContent = initials.substring(0, 2);

        // Pre-fill form with user's name and email
        document.getElementById('name').value = user.fullName;
        document.getElementById('email').value = user.email;

        // Handle form submission
        document.getElementById('supportForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const subjectSelect = document.getElementById('subject');
            const subject = subjectSelect.options[subjectSelect.selectedIndex].text;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            const attachment = document.getElementById('attachment').files[0];

            const formData = new FormData();
            formData.append('name', name);
            formData.append('email', email);
            formData.append('subject', subject);
            formData.append('message', message);
            if (attachment) formData.append('attachment', attachment);
            formData.append('userId', user.id);

            const submitBtn = document.querySelector('.submit-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;

            try {
                // In production, replace this with your real endpoint: /api/support
                // For now, we simulate a successful submission and store in localStorage
                await new Promise(resolve => setTimeout(resolve, 1000));

                // Save to localStorage for demonstration (you can remove this later)
                const supportTickets = JSON.parse(localStorage.getItem('supportTickets') || '[]');
                const newTicket = {
                    id: Date.now(),
                    name,
                    email,
                    subject,
                    message,
                    attachmentName: attachment ? attachment.name : null,
                    userId: user.id,
                    date: new Date().toISOString()
                };
                supportTickets.push(newTicket);
                localStorage.setItem('supportTickets', JSON.stringify(supportTickets));

                showMessage('Your message has been sent! We’ll get back to you soon.', 'success');
                document.getElementById('supportForm').reset();
                document.getElementById('name').value = user.fullName;
                document.getElementById('email').value = user.email;
            } catch (error) {
                console.error('Support submission error:', error);
                showMessage('Something went wrong. Please try again later.', 'error');
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        function showMessage(text, type) {
            const msgDiv = document.getElementById('formMessage');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.className = 'message';
            }, 5000);
        }
    </script>
</body>
</html>
