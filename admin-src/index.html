<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aura Payment Admin Dashboard" />
    <title>Aura Payment – Admin Dashboard</title>
    <!-- Tailwind CSS CDN (v3) – quick styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom overrides (optional) -->
    <style>
      * {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      }
      body {
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      }
      /* Smooth transitions for interactive elements */
      button, a {
        transition: all 0.2s ease;
      }
      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      /* Loading state */
      #root:empty::before {
        content: "Loading admin dashboard...";
        display: block;
        padding: 2rem;
        color: #64748b;
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 500;
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <div id="root"></div>
    <script type="module">
      import('/src/main.tsx').catch(err => {
        console.error('Failed to load app:', err);
        document.getElementById('root').innerHTML = `
          <div style="padding: 2rem; color: #dc2626; font-family: system-ui;">
            <h1>Error Loading Dashboard</h1>
            <p>${err.message || 'An error occurred while loading the admin dashboard.'}</p>
            <p style="color: #999; font-size: 0.9rem; margin-top: 1rem;">Check browser console for details.</p>
          </div>
        `;
      });
    </script>
  </body>
</html>
